name: multirole_login
description: A multi-role login system with admin and user roles using Supabase.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.5.0
  provider: ^6.0.0
  google_fonts: ^6.1.0
  ionicons: ^0.2.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  crop_your_image: ^2.0.0
  file_picker: ^10.3.10
  image: ^4.8.0
  image_picker: ^1.2.1
  uuid: ^4.4.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/carepulse_logo.png
flutter_icons:
  android: true
  image_path: "assets/icon/carepulse_logo.png"

